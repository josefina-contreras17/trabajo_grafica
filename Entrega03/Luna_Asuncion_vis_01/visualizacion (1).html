<!DOCTYPE html>
<html>
<head>

    }

  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@5"></script>

  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "data": {"name": "data-dbbf3430924add6364b036e22fd8b082"}, "mark": {"type": "bar"}, "encoding": {"x": {"field": "Promedio", "type": "quantitative"}, "y": {"field": "Atributo", "sort": "-x", "type": "nominal"}}, "height": 300, "title": "Perfil promedio del rock chileno", "width": 600, "$schema": "https://vega.github.io/schema/vega-lite/v5.20.1.json", "datasets": {"data-dbbf3430924add6364b036e22fd8b082": [{"Atributo": "Danceability", "Promedio": 0.5187844827586207}, {"Atributo": "Energy", "Promedio": 0.7049400862068965}, {"Atributo": "Acousticness", "Promedio": 0.18815145249999998}, {"Atributo": "Instrumentalness", "Promedio": 0.1143992063362069}, {"Atributo": "Liveness", "Promedio": 0.1949185344827586}, {"Atributo": "Speechiness", "Promedio": 0.05587672413793104}, {"Atributo": "Valence", "Promedio": 0.572978448275862}]}};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
